name: Argia Daily Sync

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  sync_process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: First Sync Attempt
        id: sync1
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}
        run: python argia.py

      - name: Verify Attempt 1
        id: verify1
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python argia_verification.py

      # REPRACJA: Odpala się tylko jeśli Verify 1 padnie
      - name: Auto-Repair on Failure
        if: failure()
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          RETRY_ATTEMPT: 'true' # Flaga dla weryfikatora
        run: |
          echo "🔄 Running Repair Script..."
          python fix_meteo_final.py
          echo "🧐 Final Verification..."
          python argia_verification.py
