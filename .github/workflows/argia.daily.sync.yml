name: Argia Daily Sync

on:
  schedule:
    - cron: '0 12 * * *' # 06:00 rano w Meksyku (UTC-6)
  workflow_dispatch:

jobs:
  sync_process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily sync
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

          # Huawei (SmartPVMS / FusionSolar thirdData)
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}
          # opcjonalnie, jeśli chcesz inną domenę niż la5:
          # HUAWEI_BASE_URL: ${{ secrets.HUAWEI_BASE_URL }}

          # Growatt
          GROWATT_API_TOKEN: ${{ secrets.GROWATT_API_TOKEN }}
          # Legacy fallback (może być blokowane 403)
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}

        run: python argia.py
