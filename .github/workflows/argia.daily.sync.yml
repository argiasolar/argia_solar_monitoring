name: Argia Daily Sync

on:
  schedule:
    - cron: '0 12 * * *' # 06:00 rano w Meksyku (America/Mexico_City)
  workflow_dispatch:

jobs:
  sync_process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run daily sync
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

          # Huawei (Northbound / thirdData)
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}
          HUAWEI_BASE_URL: ${{ secrets.HUAWEI_BASE_URL }} # opcjonalnie, np. https://la5.fusionsolar.huawei.com/thirdData

          # Growatt OpenAPI token
          GROWATT_API_TOKEN: ${{ secrets.GROWATT_API_TOKEN }}

          # (opcjonalnie) legacy user/pass – tylko jeśli chcesz próbować fallback B
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}

        run: |
          python argia.py
