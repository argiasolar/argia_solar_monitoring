name: Argia Daily Sync

on:
  schedule:
    - cron: '0 12 * * *' # Odpala się codziennie o 12:00 UTC (06:00 rano CST w Meksyku)
  workflow_dispatch:      # Pozwala odpalić skrypt ręcznie w dowolnym momencie

jobs:
  sync_process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # KROK 1: Pierwsza próba synchronizacji (Pobieranie realnych danych przez API)
      - name: First Sync Attempt
        id: sync1
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}
        run: python argia.py

      # KROK 2: Weryfikacja danych (Jeśli znajdzie zera, skrypt zakończy się błędem i wymusi Krok 3)
      - name: Verify Data Integrity
        id: verify1
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          RETRY_ATTEMPT: 'false'
        run: python argia_verification.py

      # KROK 3: Automatyczna naprawa (Uruchamia się TYLKO jeśli Krok 2 wyrzucił błąd)
      - name: Auto-Repair and Final Verification
        if: failure()
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}
          RETRY_ATTEMPT: 'true'
        run: |
          echo "🔄 First attempt failed or data incomplete. Starting Self-Healing..."
          # Weryfikator przy RETRY_ATTEMPT=true uruchomi funkcję repair_missing_weather z argia_weather.py
          python argia_verification.py
