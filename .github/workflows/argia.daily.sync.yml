name: Argia Daily Sync

on:
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch:

concurrency:
  group: argia-daily-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run argia.py (production + weather)
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}

          # Growatt API token (production kWh daily) – if your argia_growatt.py uses it
          GROWATT_API_TOKEN: ${{ secrets.GROWATT_API_TOKEN }}

          # Growatt Web credentials (ENV/weather station pages)
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}

          # Weather / debugging
          GROWATT_DEBUG: "1"
          GROWATT_FALLBACK_DAYS: "2"
          GROWATT_WEB_BASE: "https://server.growatt.com"

          # Huawei plants use this Growatt plant as irradiance/weather source (SMS)
          GROWATT_WEATHER_FALLBACK_PLANT_ID: "10069072"
          GROWATT_WEATHER_FALLBACK_DATALOG_SN: "DYD1EZR007"
          GROWATT_WEATHER_FALLBACK_ADDR: "32"

          # Cloud cover average window (local time at plant coords via Open-Meteo timezone=auto)
          CLOUDS_START_HOUR: "7"
          CLOUDS_END_HOUR: "19"

        run: |
          python argia.py

      - name: Verify sync in sheet
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python argia_verification.py
