name: Argia Daily Sync

on:
  schedule:
    # 00:15 UTC to 18:15 w Meksyku (UTC-6). 
    # Idealny czas, by zebrać pełną produkcję z całego dnia.
    - cron: '15 0 * * *' 
  workflow_dispatch:

jobs:
  sync_process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Przyspiesza kolejne uruchomienia

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily sync
        env:
          # Google Sheets
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

          # Huawei (SmartPVMS / FusionSolar)
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}
          HUAWEI_BASE_URL: ${{ secrets.HUAWEI_BASE_URL }}

          # Growatt OpenAPI
          GROWATT_API_TOKEN: ${{ secrets.GROWATT_API_TOKEN }}
          
          # Strefa czasowa dla weryfikacji (opcjonalnie)
          TZ_NAME: "America/Mexico_City"

        run: python argia.py

      - name: Verify Sync
        if: success()
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python argia.verification.py
