name: Argia Daily Sync

on:
  schedule:
    - cron: '0 12 * * *' # 06:00 rano w Meksyku (CDMX UTC-6)
  workflow_dispatch:

jobs:
  sync_process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Single entrypoint: orchestrates sync + verify + retry + dummy
      - name: Run daily sync
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}
          # Optional tuning:
          ARGIA_MAX_RETRY_ROUNDS: "2"
          ARGIA_MIN_KWH: "0.1"
        run: python argia.py
