name: Argia Daily Sync

on:
  schedule:
    - cron: '0 12 * * *' # 06:00 rano w Meksyku (America/Mexico_City)
  workflow_dispatch:

jobs:
  sync_process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily sync (argia.py)
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

          # Huawei (default creds)
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}

          # Growatt option B (legacy user/pass)
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}

          # Growatt option A (OpenAPI v1 token)
          GROWATT_API_TOKEN: ${{ secrets.GROWATT_API_TOKEN }}

          # Optional: if you know your Growatt OpenAPI region, set it as a secret and uncomment:
          # GROWATT_OPENAPI_URL: ${{ secrets.GROWATT_OPENAPI_URL }}
        run: python argia.py

      # Optional: verification step (only if you keep argia_verification.py in repo)
      # - name: Verify RawData for zeros
      #   env:
      #     GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      #     GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      #   run: python argia_verification.py
