name: Argia Growatt Health (30min)

on:
  workflow_dispatch:
  schedule:
    # Mexico City (UTC-6): 06:00–20:59
    # UTC: 12:00–02:59
    - cron: "*/30 12-23 * * *"
    - cron: "*/30 0-2 * * *"

concurrency:
  group: argia-growatt-health-30m
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Growatt health monitor
        env:
          # Google Sheets
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

          # Growatt
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}

          # Script options
          PV_HEALTH_TAB: "PV_Health_Monitoring"
          SNAP_RANGE: "SNAP!A1:Z1000"
          LOG_LEVEL: "INFO"
          GROWATT_SLEEP_SEC: "0.4"

        run: |
          python growatt_health.py
