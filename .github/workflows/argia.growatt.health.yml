name: Argia Growatt Health (30m day)

on:
  workflow_dispatch:
  #schedule:
    # Every 30 minutes from 06:00–19:59 Mexico City time
    # Mexico City is UTC-6 in your current setup, so:
    # 06:00–19:59 local => 12:00–01:59 UTC (two ranges)
    #- cron: "*/30 12-23 * * *"
    #- cron: "*/30 0-1 * * *"

concurrency:
  group: argia-growatt-health-30m
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Growatt health
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GROWATT_USER: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASS: ${{ secrets.GROWATT_PASSWORD }}

          # Optional overrides
          SNAP_RANGE: "SNAP!A1:Z"
          HEALTH_TAB: "PV_Health_Monitoring"
          LOG_LEVEL: "INFO"
          DEBUG_OUT_DIR: "out_health"
        run: |
          python growatt_health.py

      - name: Upload debug artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: out_health
          path: out_health
