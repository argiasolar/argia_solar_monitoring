name: ARGIA Growatt Monitoring (30m)

on:
  schedule:
    # Every 30 minutes
    #- cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "snap | probe"
        required: true
        default: "snap"

jobs:
  growatt_monitoring:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run (probe or snap)
        env:
          # Growatt
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}

          # Google Sheets
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

          # Optional debug verbosity (0/1)
          ARGIA_MONITORING_DEBUG: "1"

          # Optional Growatt endpoint overrides (usually not needed)
          # GROWATT_BASE_URL: "https://server.growatt.com"
          # GROWATT_LOGIN_URL: "https://server.growatt.com/login"
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="snap"; fi

          echo "Mode: $MODE"

          if [ "$MODE" = "probe" ]; then
            python argia_probe.py
          else
            python argia_snap.py
          fi
