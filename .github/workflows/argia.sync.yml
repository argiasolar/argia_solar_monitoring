name: Argia Unified Sync (10min)

on:
  workflow_dispatch:
  schedule:
    # Every 10 minutes from 06:00–19:59 Mexico City time (UTC-6)
    - cron: "*/10 12-23 * * *"
    - cron: "*/10 0-1 * * *"

concurrency:
  group: argia-unified-sync-10m
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unified inverter+meteo sync
        env:
          # Google Sheets
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

          # Tabs / ranges
          UNIFIED_TAB: "InverterUnified10m"
          SNAP_RANGE: "SNAP!A1:Z1000"
          CONFIG_RANGE: "Config_Plants!A1:Z1000"

          # Growatt Web (inverters + meteo ENV history)
          # Export both var names to avoid mismatches across modules.
          GROWATT_WEB_BASE: "https://server.growatt.com"
          GROWATT_SERVER_BASE: "https://server.growatt.com"
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}
          GROWATT_USER: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASS: ${{ secrets.GROWATT_PASSWORD }}

          # Huawei FusionSolar thirdData
          HUAWEI_BASE_URL: "https://la5.fusionsolar.huawei.com/thirdData"
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}
          HUAWEI_INVERTER_DEVTYPE: "1"

          # Cloud coverage fallback (OpenWeather)
          # Export both names in case argia_meteo.py expects a different env var.
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          OPEN_WEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

          # Interval settings
          INTERVAL_MINUTES: "10"

          # Debug / logs
          LOG_LEVEL: "INFO"
          GROWATT_DEBUG: "1"
          ARGIA_METEO_DEBUG: "1"

          # Open-Meteo robustness
          OPEN_METEO_TIMEOUT: "10"
          OPEN_METEO_RETRIES: "3"
          OPEN_METEO_BACKOFF_SEC: "1.2"

          # Growatt ENV paging robustness
          GROWATT_ENV_MAX_PAGES: "6"
          GROWATT_ENV_PAGE_SLEEP: "0.10"

        run: |
          python argia_sync.py
