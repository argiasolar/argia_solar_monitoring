name: Run SMA Sandbox Download

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes

jobs:
  download:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'your-repo-owner'  # Optional: replace with your GitHub username/org

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check time range (UTC 08:00-19:00)
        id: check_time
        run: |
          CURRENT_HOUR=$(date -u +%H)
          if [ $CURRENT_HOUR -ge 8 ] && [ $CURRENT_HOUR -lt 19 ]; then
            echo "within_range=true" >> $GITHUB_OUTPUT
          else
            echo "within_range=false" >> $GITHUB_OUTPUT
          fi

      - name: Run download script
        if: steps.check_time.outputs.within_range == 'true'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}  # JSON content as multiline secret
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python argia_download.py
