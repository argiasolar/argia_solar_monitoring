name: Daily Solar Data Sync

on:
  schedule:
    # Uruchomienie o 06:00 rano czasu CST (Meksyk) = 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests google-auth google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run argia.py
        env:
          # Podstawowe konfiguracje
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          
          # Huawei Secrets
          HUAWEI_USER: ${{ secrets.HUAWEI_USER }}
          HUAWEI_PASS: ${{ secrets.HUAWEI_PASS }}
          
          # Growatt Secrets (Dodane)
          GROWATT_USER: ${{ secrets.GROWATT_USER }}
          GROWATT_PASS: ${{ secrets.GROWATT_PASS }}
          
        run: python argia.py
