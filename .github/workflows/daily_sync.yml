name: Argia Daily Solar Sync

on:
  schedule:
    # Uruchamia się codziennie o 7:00 rano czasu UTC (dostosuj do Meksyku)
    - cron: '0 7 * * *'
  workflow_dispatch: # Pozwala Ci odpalić skrypt ręcznie przyciskiem w GitHubie

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Solar Metering
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GROWATT_API_TOKEN: ${{ secrets.GROWATT_API_TOKEN }}
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}
          # Dodaj resztę secretów tutaj
        run: python argia.py
