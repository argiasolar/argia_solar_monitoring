name: Manual Weather Fix

on:
  workflow_dispatch: # Pozwala na ręczne kliknięcie "Run workflow"

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Tu dodajemy brakujące biblioteki Google
          pip install requests google-auth google-api-python-client google-auth-httplib2

      - name: Run repair script
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python fix_meteo_final.py
