name: Argia Growatt Scan Inverters (manual)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Growatt inverter scanner
        env:
          GROWATT_BASE: "https://server.growatt.com"
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}

          # <<< PUT YOUR PLANT IDS HERE >>>
          # Example:
          # GROWATT_PLANT_IDS: "9275498,9309589,9309575,10078094"
          GROWATT_PLANT_IDS: "9275498,9309589,9309575,10078094"

          # output folder
          GROWATT_OUT_DIR: "out"
        run: |
          python argia_growatt_scan_inverters.py

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: growatt_scan_out
          path: out
          if-no-files-found: error
