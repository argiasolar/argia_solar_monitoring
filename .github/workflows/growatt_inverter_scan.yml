name: ARGIA - Growatt Inverter Scan (manual)

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    env:
      MODE: scan
      GROWATT_BASE: https://server.growatt.com
      GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
      GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}

      # ✅ add these
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests google-api-python-client google-auth google-auth-httplib2

      - name: Run inverter scan
        run: |
          python argia_probe.py

      - name: Sanitize filenames (remove invalid characters)
        run: |
          echo "Sanitizing filenames..."
          find out -type f | while read f; do
            clean=$(echo "$f" | sed 's/[<>:"|?*\r\n]/_/g')
            if [ "$f" != "$clean" ]; then
              mv "$f" "$clean"
            fi
          done

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: growatt-inverter-scan-out
          path: out
