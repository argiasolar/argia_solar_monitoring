name: Growatt Inverters

on:
  workflow_dispatch:
  schedule:
    # Daily at 07:10 Mexico City (UTC-6) ≈ 13:10 UTC
    - cron: "10 13 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Run Growatt inverter snapshot
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GROWATT_USER: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASS: ${{ secrets.GROWATT_PASSWORD }}
          SNAP_RANGE: "SNAP!A1:Z"
          INVERTER_TAB: "InverterData"
          DEBUG_OUT_DIR: "out"
        run: |
          python argia_growatt_inverters.py

      - name: Upload debug output (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: growatt-inverters-debug
          path: out
          if-no-files-found: ignore
