name: Growatt InverterData (per inverter)

on:
  workflow_dispatch:
  schedule:
    # runs daily at 01:40 UTC = 19:40 Mexico City (UTC-6)
    - cron: "40 1 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Run inverter snapshot to Google Sheets
        env:
          GROWATT_USER: ${{ secrets.GROWATT_USER }}
          GROWATT_PASS: ${{ secrets.GROWATT_PASS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SNAP_RANGE: "SNAP!A1:Z"
          INVERTER_SHEET: "InverterData"
          TIMEZONE_OFFSET: "-06:00"
          DEBUG: "0"
        run: |
          python argia_growatt_inverters.py
