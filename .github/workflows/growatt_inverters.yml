name: Growatt Inverters

on:
  workflow_dispatch:
  schedule:
    # every day at 01:40 UTC (adjust if you want)
    - cron: "40 1 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Growatt inverter script
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GROWATT_USER: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASS: ${{ secrets.GROWATT_PASSWORD }}
          SNAP_RANGE: "SNAP!A1:Z"
          INVERTER_TAB: "InverterData"
          TIMEZONE_OFFSET_HOURS: "-6"
        run: |
          python argia_growatt_inverters.py
