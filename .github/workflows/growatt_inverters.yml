name: Growatt Inverters (30min)

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes (GitHub Actions is best-effort; may drift a bit)
    - cron: "*/30 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Run Growatt inverter snapshot
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GROWATT_USER: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASS: ${{ secrets.GROWATT_PASSWORD }}
          SNAP_RANGE: "SNAP!A1:Z"
          INVERTER_TAB: "InverterData"
          DEBUG_OUT_DIR: "out"
          # Optional tuning:
          # MAX_PAGES: "10"
          # PAGE_SIZE: "20"
          # LOG_LEVEL: "INFO"
        run: |
          python argia_growatt_inverters.py

      - name: Upload debug output (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: growatt-inverters-debug
          path: out
          if-no-files-found: ignore
