name: Growatt Inverters

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 06:10 Mexico City approx (GitHub uses UTC).
    # Mexico City is usually UTC-6 -> 12:10 UTC
    - cron: "10 12 * * *"

jobs:
  run-growatt-inverters:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Run Growatt Inverters script
        env:
          # Growatt
          GROWATT_USER: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASS: ${{ secrets.GROWATT_PASSWORD }}

          # Google Sheets
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

          # Optional overrides (you can delete these if not needed)
          SNAP_RANGE: "SNAP!A1:Z"
          INVERTER_SHEET: "InverterData"
          LOG_LEVEL: "INFO"
        run: |
          python argia_growatt_inverters.py
