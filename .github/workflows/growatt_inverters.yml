name: Growatt Inverters

on:
  workflow_dispatch:
  schedule:
    # Mexico time depends on DST; keep it simple: run daily.
    # Change as you like later.
    - cron: "30 1 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Run Growatt Inverters (Step2)
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

          GROWATT_USER: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASS: ${{ secrets.GROWATT_PASSWORD }}

          # Optional tuning:
          SNAP_RANGE: "SNAP!A1:Z"
          INVERTER_SHEET_NAME: "InverterData"
          DEBUG_OUT: "out_inverters"
          MAX_PAGES: "10"
        run: |
          python argia_growatt_inverters.py

      - name: Upload debug artifact (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: growatt-inverters-debug
          path: out_inverters
          if-no-files-found: ignore
