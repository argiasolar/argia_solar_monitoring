name: Huawei Inverters (10min)

on:
  workflow_dispatch:
  schedule:
    # Every 10 minutes from 06:00–19:59 Mexico City time (UTC-6)
    - cron: "*/10 12-23 * * *"
    - cron: "*/10 0-1 * * *"

concurrency:
  group: huawei-inverters
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Huawei inverter snapshot
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}

          # Region base; keep LA5 unless you move tenants
          HUAWEI_BASE_URL: "https://la5.fusionsolar.huawei.com/thirdData"

          SNAP_RANGE: "SNAP!A1:Z"
          HUAWEI_INVERTER_TAB: "HuaweiInverterData"
          LOG_LEVEL: "INFO"

          # Optional override if your tenant uses a different devTypeId for inverters
          HUAWEI_INVERTER_DEVTYPE: "1"

        run: |
          python argia_huawei_inverters.py
