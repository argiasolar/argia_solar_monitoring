name: Argia Solar Daily Monitoring

on:
  schedule:
    - cron: '0 14 * * *'  # Codziennie o 14:00 UTC → 8:00 rano czasu Mexico (UTC-6 w zimie)
  workflow_dispatch:      # Pozwala uruchomić ręcznie przyciskiem

jobs:
  run-monitoring:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitoring
        env:
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_NAME: ARGA Solar
        run: python main.py
