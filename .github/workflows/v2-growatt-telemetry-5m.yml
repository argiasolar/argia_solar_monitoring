name: v2 Growatt Telemetry 5m

# Manual trigger only for now. Once we have 2-3 days of clean runs, we'll add
# a cron schedule for 5-min execution during MX daylight hours.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch but do not write to sheet)"
        required: true
        default: true
        type: boolean
      plant_key:
        description: "Run only this Growatt plant (e.g. GTO1). Empty = all."
        required: false
        default: ""
        type: string
      log_level:
        description: "Log level"
        required: true
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR

concurrency:
  group: v2-growatt-telemetry-5m
  cancel-in-progress: false

jobs:
  telemetry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: v2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build CLI args
        id: args
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.plant_key }}" ]; then
            ARGS="$ARGS --plant-key ${{ github.event.inputs.plant_key }}"
          fi
          ARGS="$ARGS --log-level ${{ github.event.inputs.log_level }}"
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "Will run with: $ARGS"

      - name: Run growatt_telemetry_5m
        env:
          # Sheet target
          GOOGLE_SHEET_ID_V2: ${{ secrets.GOOGLE_SHEET_ID_V2 }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          # Growatt web (used for inverter telemetry AND irradiance)
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}
        run: |
          PYTHONPATH=. python scripts/growatt_telemetry_5m.py ${{ steps.args.outputs.args }}
