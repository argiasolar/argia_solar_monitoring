name: v2-kpi-eod

# End-of-day KPI run: computes one KPI_Daily row per active plant for a date
# (energy, irradiance, PR, PR_STC, capacity factor) and upserts them.
#
# Two ways to run:
#   * SCHEDULED (daily 12:00 UTC = 06:00 MX): computes YESTERDAY — a complete
#     day, after the previous day's telemetry has fully landed (~22:00 MX /
#     04:00 UTC) — and WRITES to KPI_Daily. This is the normal operating path;
#     because it always targets a finished day it avoids the partial-day PR skew
#     you see when running mid-day for today.
#   * MANUAL (workflow_dispatch): pick any date, dry-run by DEFAULT (computes +
#     logs incl. PR_STC and module temp, writes nothing until you turn dry_run
#     OFF).
#
# NOTE ON PR_STC: it's only non-blank for dates whose telemetry carries
# module_temp_c — i.e. from the day the temperature columns started landing
# onward. Earlier dates log PR_STC=-- (no module temps), which is expected.

on:
  schedule:
    # 12:00 UTC daily = 06:00 America/Mexico_City (UTC-6). Targets yesterday.
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      dense_irradiance:
        description: "Use dense ShineMaster history for irradiance (verify with v2-irr-compare first)"
        required: false
        default: false
        type: boolean
      date:
        description: "Date YYYY-MM-DD (MX local). Empty = yesterday."
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run (compute + log, no writes to KPI_Daily)."
        required: true
        default: true
        type: boolean
      log_level:
        description: "Log level"
        required: true
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR

concurrency:
  group: v2-kpi-eod
  cancel-in-progress: false

jobs:
  kpi-eod:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: v2/requirements.txt

      - name: Install dependencies
        working-directory: ./v2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run kpi_eod
        working-directory: ./v2
        env:
          GOOGLE_SHEET_ID_V2: ${{ secrets.GOOGLE_SHEET_ID_V2 }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled: yesterday (default date), APPLY (no --dry-run).
            ARGS="--log-level INFO"
          else
            # Manual dispatch: honor the inputs; dry-run by default.
            ARGS="--log-level ${{ inputs.log_level }}"
            if [ -n "${{ inputs.date }}" ]; then
              ARGS="$ARGS --date ${{ inputs.date }}"
          fi
          if [ "${{ inputs.dense_irradiance }}" = "true" ]; then
            ARGS="$ARGS --dense-irradiance"
            fi
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              ARGS="$ARGS --dry-run"
            fi
          fi
          echo "Running with args: $ARGS"
          PYTHONPATH=. python scripts/kpi_eod.py $ARGS
