name: v2-normalize-kpi-dates (manual, one-time)

# One-time repair: convert any TEXT date_iso cells in KPI_Daily to real dates so
# the downstream QUERY(IMPORTRANGE) in ARGIA_Solar stops dropping them.
# DRY RUN by default — set apply=true to actually write. Touches only date_iso.
# Safe to delete this workflow once the repair is done.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Actually write the conversions (unchecked = dry run)"
        type: boolean
        required: false
        default: false

jobs:
  normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: v2/requirements.txt

      - name: Install dependencies
        working-directory: ./v2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Normalize date_iso
        working-directory: ./v2
        env:
          GOOGLE_SHEET_ID_V2: ${{ secrets.GOOGLE_SHEET_ID_V2 }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          ARGS=""
          if [ "${{ inputs.apply }}" = "true" ]; then
            ARGS="--apply"
          fi
          echo "Running with args: ${ARGS:-<dry-run>}"
          PYTHONPATH=. python scripts/normalize_kpi_dates.py $ARGS
