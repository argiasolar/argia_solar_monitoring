name: v2-reconcile (manual, read-only)

# Stage 1 migration gate: compare v2 KPI_Daily energy vs v1 ARGIA_Solar
# DailyData, per plant per day. READ-ONLY — writes nothing to either sheet.
# Results are printed to the run log.

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Look back N days from yesterday (ignored if start+end set)"
        required: false
        default: "14"
      start:
        description: "ISO start date (optional, use with end)"
        required: false
        default: ""
      end:
        description: "ISO end date (optional, use with start)"
        required: false
        default: ""
      tolerance:
        description: "Energy gate threshold, percent"
        required: false
        default: "2.0"
      include_today:
        description: "Include today's (partial) day"
        type: boolean
        required: false
        default: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: v2/requirements.txt

      - name: Install dependencies
        working-directory: ./v2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run reconcile (read-only)
        working-directory: ./v2
        env:
          GOOGLE_SHEET_ID_V2: ${{ secrets.GOOGLE_SHEET_ID_V2 }}
          # Optional. If unset, the script falls back to the known ARGIA_Solar id.
          GOOGLE_SHEET_ID_V1: ${{ secrets.GOOGLE_SHEET_ID_V1 }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          ARGS="--days ${{ inputs.days }} --tolerance ${{ inputs.tolerance }}"
          if [ -n "${{ inputs.start }}" ] && [ -n "${{ inputs.end }}" ]; then
            ARGS="$ARGS --start ${{ inputs.start }} --end ${{ inputs.end }}"
          fi
          if [ "${{ inputs.include_today }}" = "true" ]; then
            ARGS="$ARGS --include-today"
          fi
          echo "Running with args: $ARGS"
          PYTHONPATH=. python scripts/reconcile_daily.py $ARGS
