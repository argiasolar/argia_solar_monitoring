name: v2-snapshot10m-run (manual)

# Manual trigger with dry-run option (default ON).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes to sheet)"
        type: boolean
        required: true
        default: true
      plant_key:
        description: "Run only one plant (e.g. SLP1). Empty = all plants."
        required: false
        default: ""

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: v2/requirements.txt

      - name: Install dependencies
        working-directory: ./v2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run 10-min snapshot
        working-directory: ./v2
        env:
          GOOGLE_SHEET_ID_V2: ${{ secrets.GOOGLE_SHEET_ID_V2 }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GROWATT_API_TOKEN: ${{ secrets.GROWATT_API_TOKEN }}
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}
          SOLAREDGE_API_KEY: ${{ secrets.SOLAREDGE_API_KEY }}
          SOLAREDGE_API_KEY2: ${{ secrets.SOLAREDGE_API_KEY2 }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.plant_key }}" ]; then
            ARGS="$ARGS --plant-key ${{ inputs.plant_key }}"
          fi
          echo "Running with args: $ARGS"
          PYTHONPATH=. python scripts/argia_mont_10min.py $ARGS
