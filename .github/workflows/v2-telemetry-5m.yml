name: v2 Telemetry 5m (all vendors)

# Runs every 5 minutes from 05:00–21:59 Mexico City local time (UTC-6, no DST).
# That's 11:00–03:59 UTC in cron, split across two ranges because cron can't
# span midnight UTC.
#
# Manual triggers from the Actions tab continue to work and respect the
# dry_run / plant_key / log_level inputs you set.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch but do not write to sheet)"
        required: true
        default: true
        type: boolean
      plant_key:
        description: "Run only this plant (any vendor). Empty = all."
        required: false
        default: ""
        type: string
      log_level:
        description: "Log level"
        required: true
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR
  # schedule moved to the Pi 2026-07-06 (crontab: telemetry line).
  # ROLLBACK = git revert of this commit; workflow_dispatch stays as
  # the manual fallback either way.
  # schedule:
  #   - cron: "*/5 11-23 * * *"
  #   - cron: "*/5 0-3 * * *"

concurrency:
  group: v2-telemetry-5m
  cancel-in-progress: false

jobs:
  telemetry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: v2
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build CLI args
        id: args
        run: |
          ARGS=""
          # Scheduled runs always write real data (never dry-run).
          # Manual runs respect the dry_run input toggle.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.plant_key }}" ]; then
            ARGS="$ARGS --plant-key ${{ github.event.inputs.plant_key }}"
          fi
          LOG_LEVEL="${{ github.event.inputs.log_level }}"
          if [ -z "$LOG_LEVEL" ]; then
            LOG_LEVEL="INFO"
          fi
          ARGS="$ARGS --log-level $LOG_LEVEL"
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "event=${{ github.event_name }}"
          echo "Will run with: $ARGS"

      - name: Run telemetry_5m
        env:
          GOOGLE_SHEET_ID_V2: ${{ secrets.GOOGLE_SHEET_ID_V2 }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          # Growatt (inverter + weather)
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}
          # Huawei FusionSolar
          HUAWEI_USERNAME: ${{ secrets.HUAWEI_USERNAME }}
          HUAWEI_PASSWORD: ${{ secrets.HUAWEI_PASSWORD }}
          # SolarEdge
          SOLAREDGE_API_KEY: ${{ secrets.SOLAREDGE_API_KEY }}
          SOLAREDGE_API_KEY2: ${{ secrets.SOLAREDGE_API_KEY2 }}
        run: |
          PYTHONPATH=. python scripts/telemetry_5m.py ${{ steps.args.outputs.args }}
