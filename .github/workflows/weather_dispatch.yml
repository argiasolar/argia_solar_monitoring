name: Growatt Weather Fetch (Multi Site)

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "15 * * * *"  # hourly at :15 UTC (optional)

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Growatt weather fetch (multi site)
        env:
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}

          # NEW: list of sites (Growatt + Huawei entries; Huawei will be skipped)
          GROWATT_SITES_JSON: ${{ secrets.GROWATT_SITES_JSON }}

          GROWATT_TZ: America/Mexico_City
          GROWATT_FALLBACK_DAYS: "2"
          GROWATT_FETCH_ALL_PAGES: "1"
          GROWATT_ENVLIST_MAX_PAGES: "50"
          GROWATT_OUT_DIR: "out"
          GROWATT_DEBUG: "1"

          # keep 0 while debugging (so job doesn't fail if some sites have no data)
          GROWATT_FAIL_ON_NO_DATA: "0"
        run: |
          python growatt_weather_fetch.py || true
          echo "== out directory =="
          ls -la out || true
          find out -type f -maxdepth 2 -print || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: growatt-weather-out
          path: out/**
          if-no-files-found: warn
