name: Growatt Weather Fetch

on:
  workflow_dispatch:
    inputs:
      plant_id:
        description: "Growatt PLANT_ID (e.g. 10069072 for SMS, 9309575 for Taigene)"
        required: true
        default: "10069072"

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Growatt weather fetch
        env:
          GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
          GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}
          GROWATT_PLANT_MAP_JSON: ${{ secrets.GROWATT_PLANT_MAP_JSON }}

          GROWATT_PLANT_ID: ${{ github.event.inputs.plant_id }}

          GROWATT_TZ: America/Mexico_City
          GROWATT_FALLBACK_DAYS: "2"
          GROWATT_FETCH_ALL_PAGES: "1"
          GROWATT_DEBUG: "1"
        run: |
          python growatt_weather_fetch.py
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: growatt-weather-${{ github.event.inputs.plant_id }}
          path: |
            .growatt_env_*.raw.json
            .growatt_env_*.raw_pages.json
            .growatt_env_*.rows.csv
            .growatt_env_*.normalized.csv
            .growatt_envpage_*.html
