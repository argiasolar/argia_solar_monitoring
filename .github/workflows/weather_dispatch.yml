name: Growatt Weather Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run probe
        env:
          GROWATT_API_TOKEN: ${{ secrets.GROWATT_API_TOKEN }}
          GROWATT_PLANT_ID: "10069072"
          GROWATT_WEATHER_SN: "DYD1EZR007"
          # Optional: set base explicitly if you know it
          # GROWATT_OPENAPI_BASE: "https://openapi.growatt.com"
          # Optional: print full JSON (careful with logs)
          GROWATT_DEBUG_JSON: "1"
        run: python growatt_weather_probe.py
