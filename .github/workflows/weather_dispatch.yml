name: growatt.weather.probe

on:
  workflow_dispatch:
  schedule:
    # daily at 21:15 Mexico City (UTC-6) => 03:15 UTC
    - cron: "15 3 * * *"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GROWATT_SERVER_BASE: https://server.growatt.com
      DEBUG_JSON: "1"
      CACHE_TTL_SEC: "0"   # probe wants fresh each run (set 0 to disable cache)
      TIMEOUT_SEC: "25"

      # required secrets
      GROWATT_USERNAME: ${{ secrets.GROWATT_USERNAME }}
      GROWATT_PASSWORD: ${{ secrets.GROWATT_PASSWORD }}

      # target for probe
      GROWATT_PLANT_ID: "10069072"
      GROWATT_WEATHER_SN: "DYD1EZR007"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run probe
        run: |
          python growatt_weather_probe.py
